# PR Environment Workflow - Dogfooding Edition
#
# Universal caller template that handles both automatic and on-demand trigger modes.
# This workflow uses the reusable workflow from this same repository,
# demonstrating how external repositories should integrate with k8s-ee.
# Configuration is read from k8s-ee.yaml in the repository root.
#
# For external repositories, change the workflow reference to:
#   uses: koder-cat/k8s-ephemeral-environments/.github/workflows/pr-environment-reusable.yml@main

name: PR Environment

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: pr-env-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  pull-requests: write
  security-events: write

jobs:
  pr-environment:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (startsWith(github.event.comment.body, '/deploy-preview') ||
        startsWith(github.event.comment.body, '/destroy-preview')))
    uses: ./.github/workflows/pr-environment-reusable.yml
    with:
      pr-number: ${{ github.event.pull_request.number || 0 }}
      pr-action: ${{ github.event.action || '' }}
      head-sha: ${{ github.event.pull_request.head.sha || '' }}
      head-ref: ${{ github.head_ref || '' }}
      repository: ${{ github.repository }}
      comment-body: ${{ github.event.comment.body || '' }}
      comment-id: ${{ github.event.comment.id || 0 }}
      issue-number: ${{ github.event.issue.number || 0 }}
      k8s-ee-ref: ${{ github.base_ref || 'main' }}
      preview-domain: ${{ vars.DOMAIN || 'k8s-ee.genesluna.dev' }}
      platforms: linux/${{ vars.ARCHITECTURE || 'arm64' }}
      k8s-ee-repo: ${{ vars.ORG_NAME || 'koder-cat' }}/k8s-ephemeral-environments
      architecture: ${{ vars.ARCHITECTURE || 'arm64' }}
    secrets: inherit
