name: PR Environment (Reusable)

# Reusable workflow for PR environments
# External repositories call this workflow to deploy preview environments
# See: docs/user-stories/epic-8-simplified-onboarding/US-031-reusable-workflow.md

on:
  workflow_call:
    inputs:
      pr-number:
        description: 'Pull request number'
        required: false
        type: number
        default: 0
      pr-action:
        description: 'PR event action (opened, reopened, synchronize, closed)'
        required: false
        type: string
        default: ''
      head-sha:
        description: 'Full commit SHA (40 characters)'
        required: false
        type: string
        default: ''
      head-ref:
        description: 'Branch name'
        required: false
        type: string
        default: ''
      repository:
        description: 'GitHub repository (owner/repo)'
        required: true
        type: string
      config-path:
        description: 'Path to k8s-ee.yaml configuration file'
        required: false
        type: string
        default: 'k8s-ee.yaml'
      preview-domain:
        description: 'Base domain for preview URLs'
        required: false
        type: string
        default: 'k8s-ee.genesluna.dev'
      kubectl-version:
        description: 'kubectl version'
        required: false
        type: string
        default: 'v1.31.0'
      helm-version:
        description: 'Helm version'
        required: false
        type: string
        default: 'v3.16.0'
      chart-version:
        description: 'k8s-ee-app chart version'
        required: false
        type: string
        default: '1.0.0'
      platforms:
        description: 'Target platform for container image build (must match cluster architecture)'
        required: false
        type: string
        default: 'linux/arm64'
      architecture:
        description: 'Target architecture for tool downloads (e.g., arm64, amd64)'
        required: false
        type: string
        default: 'arm64'
      k8s-ee-repo:
        description: 'Repository containing k8s-ee reusable actions and Helm charts (change this default in forks)'
        required: false
        type: string
        default: 'koder-cat/k8s-ephemeral-environments'
      k8s-ee-ref:
        description: 'Git ref (branch, tag, or SHA) to check out from k8s-ee-repo (defaults to main)'
        required: false
        type: string
        default: ''
      comment-body:
        description: 'Comment body text (for on-demand /deploy-preview commands)'
        required: false
        type: string
        default: ''
      comment-id:
        description: 'Comment ID (for adding reactions)'
        required: false
        type: number
        default: 0
      issue-number:
        description: 'Issue/PR number (for issue_comment events)'
        required: false
        type: number
        default: 0

# Prevent concurrent runs for the same PR
concurrency:
  group: pr-env-${{ inputs.repository }}-${{ inputs.pr-number || inputs.issue-number }}
  cancel-in-progress: false

# Checkout Strategy:
# - Jobs that need BOTH calling repo and k8s-ee actions (validate-config, build-image):
#   Checkout calling repo to root, k8s-ee to _k8s-ee/ path, use ./_k8s-ee/.github/actions/
# - Jobs that ONLY need k8s-ee actions (create-namespace, deploy-app, destroy-namespace, pr-comment):
#   Checkout k8s-ee to root, use ./.github/actions/

jobs:
  # ============================================================================
  # VALIDATE CONFIG
  # Runs on: ubuntu-latest (lightweight, fast startup)
  # Purpose: Parse and validate k8s-ee.yaml, extract config for downstream jobs
  # ============================================================================
  validate-config:
    name: Validate Config
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      contents: read
      pull-requests: read

    outputs:
      project-id: ${{ steps.validate.outputs.project-id }}
      namespace: ${{ steps.validate.outputs.namespace }}
      preview-url: ${{ steps.validate.outputs.preview-url }}
      config-json: ${{ steps.validate.outputs.config-json }}
      app-port: ${{ steps.validate.outputs.app-port }}
      health-path: ${{ steps.validate.outputs.health-path }}
      image-context: ${{ steps.validate.outputs.image-context }}
      image-dockerfile: ${{ steps.validate.outputs.image-dockerfile }}
      postgresql-enabled: ${{ steps.validate.outputs.postgresql-enabled }}
      mongodb-enabled: ${{ steps.validate.outputs.mongodb-enabled }}
      redis-enabled: ${{ steps.validate.outputs.redis-enabled }}
      minio-enabled: ${{ steps.validate.outputs.minio-enabled }}
      mariadb-enabled: ${{ steps.validate.outputs.mariadb-enabled }}
      postgresql-config: ${{ steps.validate.outputs.postgresql-config }}
      mongodb-config: ${{ steps.validate.outputs.mongodb-config }}
      redis-config: ${{ steps.validate.outputs.redis-config }}
      minio-config: ${{ steps.validate.outputs.minio-config }}
      mariadb-config: ${{ steps.validate.outputs.mariadb-config }}
      metrics-enabled: ${{ steps.validate.outputs.metrics-enabled }}
      metrics-config: ${{ steps.validate.outputs.metrics-config }}
      k8s-ee-ref: ${{ steps.resolve-k8s-ee-ref.outputs.value }}
      trigger: ${{ steps.validate.outputs.trigger }}
      resolved-pr-number: ${{ steps.resolve-pr.outputs.pr-number }}
      resolved-head-sha: ${{ steps.resolve-pr.outputs.head-sha }}
      resolved-head-ref: ${{ steps.resolve-pr.outputs.head-ref }}

    steps:
      - name: Resolve PR details
        id: resolve-pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr-number }}
          INPUT_HEAD_SHA: ${{ inputs.head-sha }}
          INPUT_HEAD_REF: ${{ inputs.head-ref }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
        with:
          script: |
            const prNumber = parseInt(process.env.INPUT_PR_NUMBER, 10) || 0;
            const issueNumber = parseInt(process.env.INPUT_ISSUE_NUMBER, 10) || 0;
            const headSha = process.env.INPUT_HEAD_SHA || '';
            const headRef = process.env.INPUT_HEAD_REF || '';

            // For pull_request events, inputs are already populated
            if (prNumber > 0 && headSha) {
              core.setOutput('pr-number', String(prNumber));
              core.setOutput('head-sha', headSha);
              core.setOutput('head-ref', headRef);
              core.info(`Using PR inputs: #${prNumber} @ ${headSha}`);
              return;
            }

            // For issue_comment events, fetch PR details from API
            if (issueNumber > 0) {
              const [owner, repo] = process.env.INPUT_REPOSITORY.split('/');
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issueNumber,
              });

              if (pr.state !== 'open') {
                core.setFailed(`PR #${issueNumber} is not open (state: ${pr.state})`);
                return;
              }

              core.setOutput('pr-number', String(pr.number));
              core.setOutput('head-sha', pr.head.sha);
              core.setOutput('head-ref', pr.head.ref);
              core.info(`Resolved from API: PR #${pr.number} @ ${pr.head.sha}`);
              return;
            }

            core.setFailed('No pr-number or issue-number provided');

      - name: Checkout calling repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ steps.resolve-pr.outputs.head-sha }}

      - name: Resolve k8s-ee ref
        id: resolve-k8s-ee-ref
        shell: bash
        env:
          K8S_EE_REF_INPUT: ${{ inputs.k8s-ee-ref }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          if [[ -n "${K8S_EE_REF_INPUT}" ]]; then
            echo "value=${K8S_EE_REF_INPUT}" >> "$GITHUB_OUTPUT"
          else
            # Extract ref from "owner/repo/.../file.yml@refs/heads/main"
            REF="${WORKFLOW_REF##*@}"
            REF="${REF#refs/heads/}"
            REF="${REF#refs/tags/}"
            # workflow_call inherits the caller's github context, so for PR
            # events the ref is refs/pull/N/merge which doesn't exist in
            # k8s-ee — fall back to the default branch
            if [[ "${REF}" == refs/* ]]; then
              echo "::warning::k8s-ee-ref auto-inference got '${REF}' (not a branch or tag); falling back to 'main'"
              REF="main"
            fi
            echo "value=${REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout k8s-ee for action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ steps.resolve-k8s-ee-ref.outputs.value }}
          path: _k8s-ee
          sparse-checkout: |
            .github/actions
            .github/config
          sparse-checkout-cone-mode: false

      - name: Validate configuration
        id: validate
        uses: ./_k8s-ee/.github/actions/validate-config
        with:
          config-path: ${{ inputs.config-path }}
          pr-number: ${{ steps.resolve-pr.outputs.pr-number }}
          repository: ${{ inputs.repository }}
          preview-domain: ${{ inputs.preview-domain }}

  # ============================================================================
  # RESOLVE ACTION
  # Runs on: ubuntu-latest
  # Purpose: Map (trigger mode, event context) to action
  # ============================================================================
  resolve-action:
    name: Resolve Action
    needs: validate-config
    runs-on: ubuntu-latest
    timeout-minutes: 2

    outputs:
      action: ${{ steps.resolve.outputs.action }}

    steps:
      - name: Determine action from trigger mode and event
        id: resolve
        shell: bash
        env:
          TRIGGER: ${{ needs.validate-config.outputs.trigger }}
          COMMENT_BODY: ${{ inputs.comment-body }}
          PR_ACTION: ${{ inputs.pr-action }}
        run: |
          set -euo pipefail

          TRIGGER="${TRIGGER:-automatic}"
          ACTION="skip"

          if [[ "${TRIGGER}" == "automatic" ]]; then
            if [[ -n "${COMMENT_BODY}" ]]; then
              # Comment events are ignored in automatic mode
              ACTION="skip"
            elif [[ "${PR_ACTION}" == "opened" || "${PR_ACTION}" == "reopened" ]]; then
              ACTION="deploy"
            elif [[ "${PR_ACTION}" == "synchronize" ]]; then
              ACTION="deploy"
            elif [[ "${PR_ACTION}" == "closed" ]]; then
              ACTION="destroy"
            fi
          elif [[ "${TRIGGER}" == "on-demand" ]]; then
            if [[ "${COMMENT_BODY}" == /deploy-preview* ]]; then
              ACTION="deploy"
            elif [[ "${COMMENT_BODY}" == /destroy-preview* ]]; then
              ACTION="destroy"
            elif [[ "${PR_ACTION}" == "opened" || "${PR_ACTION}" == "reopened" ]]; then
              # PR open/reopen is ignored in on-demand mode
              ACTION="skip"
            elif [[ "${PR_ACTION}" == "synchronize" ]]; then
              ACTION="check-redeploy"
            elif [[ "${PR_ACTION}" == "closed" ]]; then
              ACTION="destroy"
            fi
          else
            echo "::error::Unknown trigger value: ${TRIGGER}"
            exit 1
          fi

          echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
          echo "Resolved action: ${ACTION} (trigger=${TRIGGER}, pr_action=${PR_ACTION}, comment=${COMMENT_BODY:+present})"

      - name: Add eyes reaction to comment
        if: steps.resolve.outputs.action != 'skip' && inputs.comment-id != 0
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          COMMENT_ID: ${{ inputs.comment-id }}
        with:
          script: |
            const commentId = parseInt(process.env.COMMENT_ID, 10);
            if (commentId > 0) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: 'eyes',
              });
            }

  # ============================================================================
  # CHECK NAMESPACE
  # Runs on: arc-runner-set (in-cluster, has kubectl access)
  # Condition: action is check-redeploy (on-demand mode, push event)
  # Depends on: validate-config, resolve-action
  # ============================================================================
  check-namespace:
    name: Check Namespace Exists
    if: needs.resolve-action.outputs.action == 'check-redeploy'
    needs: [validate-config, resolve-action]
    runs-on: arc-runner-set
    timeout-minutes: 2

    permissions:
      contents: read

    outputs:
      exists: ${{ steps.check.outputs.exists }}

    steps:
      - name: Checkout k8s-ee for actions
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ needs.validate-config.outputs.k8s-ee-ref }}
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          kubectl-version: ${{ inputs.kubectl-version }}
          install-helm: 'false'
          architecture: ${{ inputs.architecture }}

      - name: Check if namespace exists
        id: check
        env:
          NAMESPACE: ${{ needs.validate-config.outputs.namespace }}
        run: |
          set -euo pipefail
          if kubectl get namespace "$NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace $NAMESPACE exists, will redeploy"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Namespace $NAMESPACE does not exist, skipping redeploy"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================================
  # CREATE NAMESPACE
  # Runs on: arc-runner-set (in-cluster, has kubectl access)
  # Condition: action is deploy or check-redeploy with existing namespace
  # Depends on: validate-config, resolve-action, check-namespace
  # ============================================================================
  create-namespace:
    name: Create Namespace
    if: |
      always() &&
      needs.validate-config.result == 'success' &&
      (needs.resolve-action.outputs.action == 'deploy' ||
       (needs.resolve-action.outputs.action == 'check-redeploy' && needs.check-namespace.outputs.exists == 'true'))
    needs: [validate-config, resolve-action, check-namespace]
    runs-on: arc-runner-set
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      created: ${{ steps.create.outputs.created }}
      namespace: ${{ steps.create.outputs.namespace }}

    steps:
      - name: Checkout k8s-ee for actions
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ needs.validate-config.outputs.k8s-ee-ref }}
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          kubectl-version: ${{ inputs.kubectl-version }}
          install-helm: 'false'
          architecture: ${{ inputs.architecture }}

      - name: Create namespace
        id: create
        uses: ./.github/actions/create-namespace
        with:
          namespace: ${{ needs.validate-config.outputs.namespace }}
          project-id: ${{ needs.validate-config.outputs.project-id }}
          pr-number: ${{ needs.validate-config.outputs.resolved-pr-number }}
          branch-name: ${{ needs.validate-config.outputs.resolved-head-ref }}
          commit-sha: ${{ needs.validate-config.outputs.resolved-head-sha }}
          repository: ${{ inputs.repository }}
          # Database flags for dynamic quota calculation
          postgresql-enabled: ${{ needs.validate-config.outputs.postgresql-enabled }}
          mongodb-enabled: ${{ needs.validate-config.outputs.mongodb-enabled }}
          redis-enabled: ${{ needs.validate-config.outputs.redis-enabled }}
          minio-enabled: ${{ needs.validate-config.outputs.minio-enabled }}
          mariadb-enabled: ${{ needs.validate-config.outputs.mariadb-enabled }}
          # Application port for NetworkPolicy ingress
          app-port: ${{ needs.validate-config.outputs.app-port }}

  # ============================================================================
  # BUILD IMAGE
  # Runs on: ubuntu-latest (has Docker, GHCR access)
  # Condition: action is deploy or check-redeploy with existing namespace
  # Depends on: validate-config, resolve-action, check-namespace
  # ============================================================================
  build-image:
    name: Build Image
    if: |
      always() &&
      needs.validate-config.result == 'success' &&
      (needs.resolve-action.outputs.action == 'deploy' ||
       (needs.resolve-action.outputs.action == 'check-redeploy' && needs.check-namespace.outputs.exists == 'true'))
    needs: [validate-config, resolve-action, check-namespace]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write
      security-events: write

    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.image-digest }}
      image-ref: ${{ steps.build.outputs.image-ref }}

    steps:
      # First checkout: calling repo for Dockerfile
      - name: Checkout calling repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ needs.validate-config.outputs.resolved-head-sha }}

      # Second checkout: k8s-ee repo for action (to separate path)
      # Note: build-image only needs actions, not config (validation already complete)
      - name: Checkout k8s-ee for action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ needs.validate-config.outputs.k8s-ee-ref }}
          path: _k8s-ee
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Build and push image
        id: build
        uses: ./_k8s-ee/.github/actions/build-image
        with:
          context: ${{ needs.validate-config.outputs.image-context }}
          dockerfile: ${{ needs.validate-config.outputs.image-dockerfile }}
          image-name: ${{ inputs.repository }}/${{ needs.validate-config.outputs.project-id }}
          pr-number: ${{ needs.validate-config.outputs.resolved-pr-number }}
          commit-sha: ${{ needs.validate-config.outputs.resolved-head-sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ inputs.platforms }}

  # ============================================================================
  # DEPLOY APP
  # Runs on: arc-runner-set (in-cluster, has kubectl/helm access)
  # Condition: create-namespace and build-image succeeded
  # Depends on: validate-config, create-namespace, build-image
  # ============================================================================
  deploy-app:
    name: Deploy App
    if: |
      always() &&
      needs.validate-config.result == 'success' &&
      needs.create-namespace.result == 'success' &&
      needs.build-image.result == 'success'
    needs: [validate-config, create-namespace, build-image]
    runs-on: arc-runner-set
    timeout-minutes: 10

    permissions:
      contents: read
      packages: read  # Required for GHCR token used to create imagePullSecret

    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
      release-status: ${{ steps.deploy.outputs.release-status }}

    steps:
      - name: Checkout k8s-ee for actions and charts
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ needs.validate-config.outputs.k8s-ee-ref }}
          sparse-checkout: |
            .github/actions/*
            charts/k8s-ee-app/*
            charts/postgresql/*
            charts/mongodb/*
            charts/redis/*
            charts/minio/*
            charts/mariadb/*
          sparse-checkout-cone-mode: false

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          kubectl-version: ${{ inputs.kubectl-version }}
          helm-version: ${{ inputs.helm-version }}
          architecture: ${{ inputs.architecture }}

      - name: Deploy application
        id: deploy
        uses: ./.github/actions/deploy-app
        with:
          namespace: ${{ needs.validate-config.outputs.namespace }}
          project-id: ${{ needs.validate-config.outputs.project-id }}
          pr-number: ${{ needs.validate-config.outputs.resolved-pr-number }}
          image-repository: ghcr.io/${{ inputs.repository }}/${{ needs.validate-config.outputs.project-id }}
          image-tag: ${{ needs.build-image.outputs.image-tag }}
          image-digest: ${{ needs.build-image.outputs.image-digest }}
          commit-sha: ${{ needs.validate-config.outputs.resolved-head-sha }}
          branch-name: ${{ needs.validate-config.outputs.resolved-head-ref }}
          preview-domain: ${{ inputs.preview-domain }}
          chart-version: ${{ inputs.chart-version }}
          use-local-charts: 'true'  # Use local charts to test chart changes in PRs
          app-port: ${{ needs.validate-config.outputs.app-port }}
          health-path: ${{ needs.validate-config.outputs.health-path }}
          postgresql-enabled: ${{ needs.validate-config.outputs.postgresql-enabled }}
          mongodb-enabled: ${{ needs.validate-config.outputs.mongodb-enabled }}
          redis-enabled: ${{ needs.validate-config.outputs.redis-enabled }}
          minio-enabled: ${{ needs.validate-config.outputs.minio-enabled }}
          mariadb-enabled: ${{ needs.validate-config.outputs.mariadb-enabled }}
          postgresql-config: ${{ needs.validate-config.outputs.postgresql-config }}
          mongodb-config: ${{ needs.validate-config.outputs.mongodb-config }}
          redis-config: ${{ needs.validate-config.outputs.redis-config }}
          minio-config: ${{ needs.validate-config.outputs.minio-config }}
          mariadb-config: ${{ needs.validate-config.outputs.mariadb-config }}
          metrics-enabled: ${{ needs.validate-config.outputs.metrics-enabled }}
          metrics-config: ${{ needs.validate-config.outputs.metrics-config }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # PR COMMENT (DEPLOY)
  # Runs on: ubuntu-latest
  # Condition: Always after deploy-app (success or failure), when action was deploy
  # Posts deployment status to PR
  # ============================================================================
  pr-comment-deploy:
    name: PR Comment (Deploy)
    if: |
      always() &&
      needs.validate-config.result == 'success' &&
      (needs.resolve-action.outputs.action == 'deploy' ||
       (needs.resolve-action.outputs.action == 'check-redeploy' && needs.check-namespace.outputs.exists == 'true'))
    needs: [validate-config, resolve-action, check-namespace, build-image, deploy-app]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    permissions:
      pull-requests: write

    steps:
      - name: Checkout k8s-ee for action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ needs.validate-config.outputs.k8s-ee-ref }}
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Comment on PR (success)
        if: needs.deploy-app.result == 'success'
        uses: ./.github/actions/pr-comment
        with:
          status: deployed
          preview-url: ${{ needs.deploy-app.outputs.preview-url }}
          namespace: ${{ needs.validate-config.outputs.namespace }}
          commit-sha: ${{ needs.validate-config.outputs.resolved-head-sha }}
          branch-name: ${{ needs.validate-config.outputs.resolved-head-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ needs.validate-config.outputs.resolved-pr-number }}
          preview-domain: ${{ inputs.preview-domain }}

      - name: Comment on PR (failure)
        if: needs.deploy-app.result != 'success'
        uses: ./.github/actions/pr-comment
        with:
          status: failed
          namespace: ${{ needs.validate-config.outputs.namespace }}
          commit-sha: ${{ needs.validate-config.outputs.resolved-head-sha }}
          branch-name: ${{ needs.validate-config.outputs.resolved-head-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ needs.validate-config.outputs.resolved-pr-number }}
          preview-domain: ${{ inputs.preview-domain }}

      - name: Add rocket reaction to comment
        if: needs.deploy-app.result == 'success' && inputs.comment-id != 0
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          COMMENT_ID: ${{ inputs.comment-id }}
        with:
          script: |
            const commentId = parseInt(process.env.COMMENT_ID, 10);
            if (commentId > 0) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: 'rocket',
              });
            }

  # ============================================================================
  # DESTROY NAMESPACE
  # Runs on: arc-runner-set (in-cluster, has kubectl access)
  # Condition: action is destroy
  # Depends on: validate-config, resolve-action
  # ============================================================================
  destroy-namespace:
    name: Destroy Namespace
    if: needs.resolve-action.outputs.action == 'destroy'
    needs: [validate-config, resolve-action]
    runs-on: arc-runner-set
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      deleted: ${{ steps.destroy.outputs.deleted }}
      preserved: ${{ steps.destroy.outputs.preserved }}

    steps:
      - name: Checkout k8s-ee for actions
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ needs.validate-config.outputs.k8s-ee-ref }}
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          kubectl-version: ${{ inputs.kubectl-version }}
          install-helm: 'false'
          architecture: ${{ inputs.architecture }}

      - name: Destroy namespace
        id: destroy
        uses: ./.github/actions/destroy-namespace
        with:
          namespace: ${{ needs.validate-config.outputs.namespace }}
          repository: ${{ inputs.repository }}

  # ============================================================================
  # PR COMMENT (DESTROY)
  # Runs on: ubuntu-latest
  # Condition: Always after destroy-namespace, when action was destroy
  # Posts destroy/preserved status to PR
  # ============================================================================
  pr-comment-destroy:
    name: PR Comment (Destroy)
    if: always() && needs.resolve-action.outputs.action == 'destroy' && needs.validate-config.result == 'success'
    needs: [validate-config, resolve-action, destroy-namespace]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    permissions:
      pull-requests: write

    steps:
      - name: Checkout k8s-ee for action
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.3.1
        with:
          repository: ${{ inputs.k8s-ee-repo }}
          ref: ${{ needs.validate-config.outputs.k8s-ee-ref }}
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Comment on PR (destroyed)
        if: needs.destroy-namespace.outputs.preserved != 'true'
        uses: ./.github/actions/pr-comment
        with:
          status: destroyed
          namespace: ${{ needs.validate-config.outputs.namespace }}
          commit-sha: ${{ needs.validate-config.outputs.resolved-head-sha }}
          branch-name: ${{ needs.validate-config.outputs.resolved-head-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ needs.validate-config.outputs.resolved-pr-number }}
          preview-domain: ${{ inputs.preview-domain }}

      - name: Comment on PR (preserved)
        if: needs.destroy-namespace.outputs.preserved == 'true'
        uses: ./.github/actions/pr-comment
        with:
          status: preserved
          namespace: ${{ needs.validate-config.outputs.namespace }}
          commit-sha: ${{ needs.validate-config.outputs.resolved-head-sha }}
          branch-name: ${{ needs.validate-config.outputs.resolved-head-ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ needs.validate-config.outputs.resolved-pr-number }}
          preview-domain: ${{ inputs.preview-domain }}

      - name: Add reaction to comment
        if: inputs.comment-id != 0
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          COMMENT_ID: ${{ inputs.comment-id }}
          DESTROY_RESULT: ${{ needs.destroy-namespace.result }}
        with:
          script: |
            const commentId = parseInt(process.env.COMMENT_ID, 10);
            const success = process.env.DESTROY_RESULT === 'success';
            if (commentId > 0) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: success ? '+1' : '-1',
              });
            }
