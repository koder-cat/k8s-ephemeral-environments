name: "Build Image"
description: "Build container image, push to registry (GHCR or ECR), run Trivy scan, and generate SBOM"

inputs:
  context:
    description: "Docker build context path"
    required: false
    default: "."
  dockerfile:
    description: "Path to Dockerfile relative to context"
    required: false
    default: "Dockerfile"
  image-name:
    description: "Image name without registry (e.g., org/app)"
    required: true
  pr-number:
    description: "PR number for tagging"
    required: true
  commit-sha:
    description: "Full commit SHA for tagging"
    required: true
  registry:
    description: "Container registry hostname (used when registry-type is ghcr)"
    required: false
    default: "ghcr.io"
  registry-type:
    description: "Registry type: 'ghcr' (default) or 'ecr'"
    required: false
    default: "ghcr"
  ecr-aws-access-key-id:
    description: "AWS access key ID for ECR authentication (required when registry-type is ecr)"
    required: false
    default: ""
  ecr-aws-secret-access-key:
    description: "AWS secret access key for ECR authentication (required when registry-type is ecr)"
    required: false
    default: ""
  ecr-region:
    description: "AWS ECR region (required when registry-type is ecr)"
    required: false
    default: ""
  platforms:
    description: "Target platforms (comma-separated)"
    required: false
    default: "linux/arm64"
  trivy-severity:
    description: "Trivy severity levels to report"
    required: false
    default: "CRITICAL,HIGH"
  github-token:
    description: "GitHub token for GHCR authentication (packages:write) and SARIF upload (security-events:write)"
    required: true

outputs:
  image-tag:
    description: "Short image tag (commit SHA)"
    value: ${{ steps.meta.outputs.version }}
  image-digest:
    description: "Image digest for immutable reference"
    value: ${{ steps.build.outputs.digest }}
  image-ref:
    description: "Full image reference with digest (registry/name@sha256:...). Note: deploy-app uses image-tag and image-digest separately for Helm chart compatibility."
    value: ${{ steps.image-ref.outputs.image-ref }}
  registry-url:
    description: "Effective registry URL used for the image (ghcr.io or <account>.dkr.ecr.<region>.amazonaws.com)"
    value: ${{ steps.resolve-registry.outputs.url }}
  trivy-sarif:
    description: "Path to Trivy SARIF results file (runner-local path; uploaded to Security tab for public repos, available as artifact for all repos)"
    value: ${{ steps.trivy.outputs.sarif-file }}
  sbom-file:
    description: "Path to SBOM file (runner-local path; artifact already uploaded via anchore/sbom-action)"
    value: ${{ steps.sbom-output.outputs.sbom-file }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        CONTEXT: ${{ inputs.context }}
        DOCKERFILE: ${{ inputs.dockerfile }}
        IMAGE_NAME: ${{ inputs.image-name }}
        PR_NUMBER: ${{ inputs.pr-number }}
        COMMIT_SHA: ${{ inputs.commit-sha }}
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_TYPE: ${{ inputs.registry-type }}
        ECR_REGION: ${{ inputs.ecr-region }}
        ECR_AWS_ACCESS_KEY_ID: ${{ inputs.ecr-aws-access-key-id }}
        ECR_AWS_SECRET_ACCESS_KEY: ${{ inputs.ecr-aws-secret-access-key }}
        PLATFORMS: ${{ inputs.platforms }}
      run: |
        set -euo pipefail

        # Validate registry-type
        if [[ "$REGISTRY_TYPE" != "ghcr" && "$REGISTRY_TYPE" != "ecr" ]]; then
          echo "ERROR: registry-type must be 'ghcr' or 'ecr'"
          echo "Received: '$REGISTRY_TYPE'"
          exit 1
        fi

        # Validate context path (no path traversal or absolute paths)
        if [[ "$CONTEXT" =~ \.\. ]]; then
          echo "ERROR: context path cannot contain '..'"
          echo "Received: '$CONTEXT'"
          exit 1
        fi
        if [[ "$CONTEXT" =~ ^/ ]]; then
          echo "ERROR: context path cannot be absolute"
          echo "Received: '$CONTEXT'"
          exit 1
        fi

        # Validate dockerfile path (no path traversal or absolute paths)
        if [[ "$DOCKERFILE" =~ \.\. ]]; then
          echo "ERROR: dockerfile path cannot contain '..'"
          echo "Received: '$DOCKERFILE'"
          exit 1
        fi
        if [[ "$DOCKERFILE" =~ ^/ ]]; then
          echo "ERROR: dockerfile path cannot be absolute"
          echo "Received: '$DOCKERFILE'"
          exit 1
        fi

        # Validate PR number is numeric
        if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
          echo "ERROR: pr-number must be numeric"
          echo "Received: '$PR_NUMBER'"
          exit 1
        fi

        # Validate commit SHA format
        if ! [[ "$COMMIT_SHA" =~ ^[a-f0-9]{40}$ ]]; then
          echo "ERROR: commit-sha must be a 40-character hex string"
          echo "Received: '$COMMIT_SHA'"
          exit 1
        fi

        # Validate image name format
        if ! [[ "$IMAGE_NAME" =~ ^[a-z0-9._-]+/[a-z0-9._-]+(/[a-z0-9._-]+)?$ ]]; then
          echo "ERROR: image-name must be in format 'owner/repo' or 'owner/repo/app'"
          echo "Received: '$IMAGE_NAME'"
          exit 1
        fi

        # Validate registry format (only for GHCR; ECR registry URL is computed)
        if [[ "$REGISTRY_TYPE" != "ecr" ]]; then
          if ! [[ "$REGISTRY" =~ ^[a-z0-9.-]+$ ]]; then
            echo "ERROR: registry must be a valid hostname"
            echo "Received: '$REGISTRY'"
            exit 1
          fi
        fi

        # Validate ECR-specific inputs
        if [[ "$REGISTRY_TYPE" == "ecr" ]]; then
          if [[ -z "$ECR_REGION" ]]; then
            echo "ERROR: ecr-region is required when registry-type is ecr"
            exit 1
          fi
          if [[ -z "$ECR_AWS_ACCESS_KEY_ID" ]]; then
            echo "ERROR: ecr-aws-access-key-id is required when registry-type is ecr (check org/repo secrets)"
            exit 1
          fi
          if [[ -z "$ECR_AWS_SECRET_ACCESS_KEY" ]]; then
            echo "ERROR: ecr-aws-secret-access-key is required when registry-type is ecr (check org/repo secrets)"
            exit 1
          fi
        fi

        # Validate platforms (comma-separated list of known Docker Buildx platform values)
        VALID_PLATFORM="linux/(amd64|arm64|arm/v6|arm/v7|arm/v8|386|ppc64le|s390x)"
        if ! [[ "$PLATFORMS" =~ ^${VALID_PLATFORM}(,${VALID_PLATFORM})*$ ]]; then
          echo "ERROR: platforms must be a comma-separated list of valid linux platforms"
          echo "  Valid values: linux/amd64, linux/arm64, linux/arm/v6, linux/arm/v7, linux/arm/v8, linux/386, linux/ppc64le, linux/s390x"
          echo "Received: '$PLATFORMS'"
          exit 1
        fi

        echo "Input validation passed"

    # NOTE: This step requires AWS CLI v2 pre-installed on the runner.
    # GitHub-hosted ubuntu-latest has it; if reusing on self-hosted runners, ensure AWS CLI is available.
    - name: Resolve registry
      id: resolve-registry
      shell: bash
      env:
        REGISTRY_TYPE: ${{ inputs.registry-type }}
        REGISTRY: ${{ inputs.registry }}
        AWS_ACCESS_KEY_ID: ${{ inputs.ecr-aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.ecr-aws-secret-access-key }}
        ECR_REGION: ${{ inputs.ecr-region }}
        IMAGE_NAME: ${{ inputs.image-name }}
      run: |
        set -euo pipefail

        if [[ "$REGISTRY_TYPE" == "ecr" ]]; then
          # Get AWS account ID
          ACCOUNT_ID=$(aws sts get-caller-identity --region "$ECR_REGION" --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${ECR_REGION}.amazonaws.com"

          # Ensure ECR repository exists (create if needed, with lifecycle policy)
          if ! aws ecr describe-repositories --repository-names "$IMAGE_NAME" --region "$ECR_REGION" >/dev/null 2>&1; then
            echo "Creating ECR repository: $IMAGE_NAME"
            aws ecr create-repository \
              --repository-name "$IMAGE_NAME" \
              --region "$ECR_REGION" \
              --image-scanning-configuration scanOnPush=false

            # Expire untagged images after 7 days to avoid unbounded accumulation
            aws ecr put-lifecycle-policy \
              --repository-name "$IMAGE_NAME" \
              --region "$ECR_REGION" \
              --lifecycle-policy-text '{"rules":[{"rulePriority":1,"description":"Expire untagged images after 7 days","selection":{"tagStatus":"untagged","countType":"sinceImagePushed","countUnit":"days","countNumber":7},"action":{"type":"expire"}}]}'
          fi

          # Get ECR login password
          ECR_PASSWORD=$(aws ecr get-login-password --region "$ECR_REGION")
          echo "::add-mask::${ECR_PASSWORD}"
          echo "password=${ECR_PASSWORD}" >> "$GITHUB_OUTPUT"

          echo "url=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "Resolved ECR registry: ${ECR_REGISTRY}"
        else
          echo "url=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "password=" >> "$GITHUB_OUTPUT"
          echo "Resolved GHCR registry: ${REGISTRY}"
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Log in to GHCR
      if: inputs.registry-type != 'ecr'
      uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
      with:
        registry: ${{ steps.resolve-registry.outputs.url }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Configure AWS credentials for ECR
      if: inputs.registry-type == 'ecr'
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
      with:
        aws-access-key-id: ${{ inputs.ecr-aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.ecr-aws-secret-access-key }}
        aws-region: ${{ inputs.ecr-region }}

    - name: Log in to ECR
      if: inputs.registry-type == 'ecr'
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ${{ steps.resolve-registry.outputs.url }}/${{ inputs.image-name }}
        tags: |
          type=sha,prefix=,format=short
          type=raw,value=pr-${{ inputs.pr-number }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.context }}/${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set image reference output
      id: image-ref
      shell: bash
      env:
        REGISTRY: ${{ steps.resolve-registry.outputs.url }}
        IMAGE_NAME: ${{ inputs.image-name }}
        DIGEST: ${{ steps.build.outputs.digest }}
      run: |
        echo "image-ref=${REGISTRY}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"

    - name: Make package public
      if: inputs.registry-type != 'ecr'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        IMAGE_NAME: ${{ inputs.image-name }}
      run: |
        set -euo pipefail

        # Extract owner and package name from image-name (e.g., koder-cat/k8s-ephemeral-environments/k8s-ee)
        OWNER="${IMAGE_NAME%%/*}"
        PACKAGE_NAME="${IMAGE_NAME#*/}"  # Remove owner prefix
        PACKAGE_NAME_ENCODED=$(echo "$PACKAGE_NAME" | sed 's|/|%2F|g')

        echo "Setting package visibility to public..."
        echo "  Owner: $OWNER"
        echo "  Package: $PACKAGE_NAME"

        # Try org endpoint first, fall back to user endpoint
        if gh api "/orgs/${OWNER}/packages/container/${PACKAGE_NAME_ENCODED}" --silent 2>/dev/null; then
          gh api --method PATCH "/orgs/${OWNER}/packages/container/${PACKAGE_NAME_ENCODED}" \
            -f visibility=public --silent || echo "Warning: Could not set package visibility (may already be public)"
        else
          gh api --method PATCH "/user/packages/container/${PACKAGE_NAME_ENCODED}" \
            -f visibility=public --silent || echo "Warning: Could not set package visibility (may already be public)"
        fi

        echo "Package visibility set to public"

    - name: Resolve scan platform
      id: scan-platform
      shell: bash
      env:
        PLATFORMS: ${{ inputs.platforms }}
      run: |
        set -euo pipefail
        # Trivy and Syft each scan one manifest at a time; use the first platform
        # from the potentially comma-separated list (e.g. "linux/arm64,linux/amd64" → "linux/arm64").
        echo "value=${PLATFORMS%%,*}" >> "$GITHUB_OUTPUT"

    - name: Run Trivy vulnerability scanner
      id: trivy
      shell: bash
      env:
        # First platform only — resolved by the scan-platform step above
        TRIVY_PLATFORM: ${{ steps.scan-platform.outputs.value }}
        # GH_TOKEN lets curl use authenticated rate limits (5000 req/hr) when
        # resolving the Trivy release. Unauthenticated API calls from shared
        # runner IPs are heavily rate-limited and return 404 without an auth
        # token or valid User-Agent. GITHUB_TOKEN reads public repos fine.
        GH_TOKEN: ${{ inputs.github-token }}
        IMAGE_REF: ${{ steps.resolve-registry.outputs.url }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
        SEVERITY: ${{ inputs.trivy-severity }}
      run: |
        set -euo pipefail

        ARCH=$(uname -m)
        case "${ARCH}" in
          x86_64)  TRIVY_ARCH="Linux-64bit" ;;
          aarch64) TRIVY_ARCH="Linux-ARM64" ;;
          *) echo "ERROR: Unsupported runner architecture: ${ARCH}"; exit 1 ;;
        esac

        TRIVY_WORK_DIR=$(mktemp -d)
        trap 'rm -rf "${TRIVY_WORK_DIR}"' EXIT

        # Resolve the latest release via the authenticated GitHub REST API.
        # Authentication is required: unauthenticated calls from shared runner
        # IPs return 404 (rate-limited). The token reads any public repo fine.
        echo "Resolving latest Trivy release..."
        TRIVY_TAG=$(curl -fsSL \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/aquasecurity/trivy/releases/latest" \
          | jq -r '.tag_name')
        TRIVY_VERSION="${TRIVY_TAG#v}"

        if [[ -z "${TRIVY_VERSION}" || "${TRIVY_VERSION}" == "null" ]]; then
          echo "ERROR: Could not determine Trivy version from GitHub API"; exit 1
        fi

        # Construct direct CDN download URLs from the version tag.
        # Checksum file is versioned: trivy_X.Y.Z_checksums.txt
        TARBALL="trivy_${TRIVY_VERSION}_${TRIVY_ARCH}.tar.gz"
        CHECKSUM_FILE="trivy_${TRIVY_VERSION}_checksums.txt"
        BASE_URL="https://github.com/aquasecurity/trivy/releases/download/${TRIVY_TAG}"
        echo "Downloading Trivy ${TRIVY_TAG} (${TRIVY_ARCH})..."
        curl -fsSL "${BASE_URL}/${TARBALL}" -o "${TRIVY_WORK_DIR}/${TARBALL}"
        curl -fsSL "${BASE_URL}/${CHECKSUM_FILE}" -o "${TRIVY_WORK_DIR}/${CHECKSUM_FILE}"

        # sha256sum --check resolves filenames relative to CWD; run inside TRIVY_WORK_DIR
        (cd "${TRIVY_WORK_DIR}" && grep "${TARBALL}" "${CHECKSUM_FILE}" | sha256sum --check --status)
        tar -xzf "${TRIVY_WORK_DIR}/${TARBALL}" -C "${TRIVY_WORK_DIR}" trivy
        export PATH="${TRIVY_WORK_DIR}:${PATH}"
        trivy --version

        # Scan the image. Docker credentials from the prior login step give registry access.
        trivy image \
          --format sarif \
          --output trivy-results.sarif \
          --severity "${SEVERITY}" \
          --platform "${TRIVY_PLATFORM}" \
          --exit-code 0 \
          --ignore-unfixed \
          "${IMAGE_REF}"

        echo "sarif-file=trivy-results.sarif" >> "$GITHUB_OUTPUT"

    - name: Check repo visibility
      if: always()
      id: repo-visibility
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        VISIBILITY=$(gh api "repos/${REPO}" --jq '.visibility')
        echo "visibility=${VISIBILITY}" >> "$GITHUB_OUTPUT"

    # SARIF upload to the Security tab requires GitHub Advanced Security,
    # which is only available on public repos (free) or private repos with
    # the paid Advanced Security feature. Skip for private repos to avoid
    # noisy errors. Trivy results are still available as an artifact.
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
      if: always() && steps.repo-visibility.outputs.visibility == 'public'
      with:
        sarif_file: "trivy-results.sarif"

    - name: Upload Trivy scan results as artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      if: always()
      with:
        name: trivy-scan-results
        path: trivy-results.sarif
        retention-days: 30

    - name: Generate SBOM
      id: sbom
      uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
      env:
        # First platform only — Syft scans one manifest at a time
        SYFT_PLATFORM: ${{ steps.scan-platform.outputs.value }}
      with:
        image: ${{ steps.resolve-registry.outputs.url }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
        format: spdx-json
        output-file: sbom-${{ inputs.pr-number }}.spdx.json
        artifact-name: sbom-pr-${{ inputs.pr-number }}
        upload-artifact: true
        upload-artifact-retention: 30

    - name: Set SBOM output
      id: sbom-output
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        echo "sbom-file=sbom-${PR_NUMBER}.spdx.json" >> "$GITHUB_OUTPUT"

    - name: Build summary
      if: always()
      shell: bash
      env:
        REGISTRY: ${{ steps.resolve-registry.outputs.url }}
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_TAG: ${{ steps.meta.outputs.version }}
        IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        PLATFORMS: ${{ inputs.platforms }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        {
          echo "## Build Summary"
          echo "| | |"
          echo "|---|---|"
          echo "| **Image** | \`${REGISTRY}/${IMAGE_NAME}\` |"
          echo "| **Tag** | \`${IMAGE_TAG}\` |"
          echo "| **Digest** | \`${IMAGE_DIGEST}\` |"
          echo "| **Platform** | \`${PLATFORMS}\` |"
          echo "| **Trivy scan** | \`trivy-results.sarif\` |"
          echo "| **SBOM** | \`sbom-${PR_NUMBER}.spdx.json\` |"
        } >> "$GITHUB_STEP_SUMMARY"
